services:
  backend:
    build:
      context: ./backend
    container_name: fraud-investigation-backend
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    # image: node:20-alpine
    container_name: fraud-investigation-frontend
    working_dir: /app
    env_file:
      - ./frontend/.env.example
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - backend
